name: FindLAPACKE

on:
  push:
    paths:
      - "FindLAPACKE.cmake"
      - "tests/**"
      - ".github/workflows/find-lapacke.yaml"
  pull_request:
    paths:
      - "FindLAPACKE.cmake"
      - "tests/**"
      - ".github/workflows/find-lapacke.yaml"
  workflow_dispatch:

# ---------------------------------------------------------------------------
# Matrix design
#
# Each entry exercises a distinct code path in FindLAPACKE.cmake:
#
#  openblas-bundled-auto     Ubuntu / libopenblas-dev + liblapacke-dev.
#                            libopenblas-dev ships LAPACKE symbols inside
#                            libopenblas.so (bundled probe succeeds) but does
#                            not install lapacke.h; that header comes from
#                            liblapacke-dev.
#
#  openblas-explicit-vendor  Same packages but BLA_VENDOR=OpenBLAS.
#                            Verifies that an explicit vendor hint still
#                            reaches the bundled-symbol branch.
#
#  standalone-liblapacke     Ubuntu / reference LAPACK + liblapacke-dev.
#                            The bundled probe fails; the fallback finds
#                            the independent liblapacke.so.
#
#  custom-prefix             Ubuntu / libopenblas-dev installed system-wide,
#                            but LAPACKE_ROOT=/usr forces the header and
#                            library search through the hint path.
#
#  not-found                 Only liblapack-dev (no LAPACKE). The module
#                            must report LAPACKE_FOUND=FALSE without error.
#                            EXPECT_FOUND=OFF makes the test CMakeLists.txt
#                            assert this and fail configure if the module
#                            incorrectly claims success.
#
#  not-found-required        Same absent LAPACKE but find_package(REQUIRED).
#                            Configure must exit non-zero; the step uses
#                            continue-on-error and the next step asserts
#                            the failure.
#
#  macos-homebrew            macOS / Homebrew OpenBLAS. LAPACKE_ROOT is set
#                            at runtime from `brew --prefix openblas` because
#                            Homebrew prefixes differ between Intel and ARM.
#
#  spack-openblas            Spack-installed OpenBLAS (bundled LAPACKE).
#                            LAPACKE_ROOT is derived from `spack location -i`
#                            at runtime, exercising the non-system prefix path
#                            through the _lapacke_find_header_near_lib helper.
#
#  spack-netlib-lapacke      Spack-installed netlib-lapack+lapacke. The bundled
#                            probe fails (netlib LAPACK has no LAPACKE symbols)
#                            and the fallback locates the standalone liblapacke
#                            under the Spack prefix.
#
#  spack-openblas+netlib     OpenBLAS provides LAPACK; a separate Spack
#   -lapacke                 netlib-lapack+lapacke provides the C interface.
#                            LAPACKE_ROOT points to the netlib prefix while
#                            BLA_VENDOR=OpenBLAS steers FindLAPACK. Mirrors
#                            a common HPC deployment where BLAS/LAPACK and
#                            LAPACKE are managed as independent Spack packages.
#
# cmake_version axis: the module minimum (3.25) is applied to every scenario;
# the latest released CMake is applied only to the two highest-value scenarios
# to keep the total job count manageable.
# ---------------------------------------------------------------------------

jobs:
  test:
    name: "${{ matrix.scenario }} / CMake ${{ matrix.cmake_version }}"
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.expect_configure_failure == true }}

    strategy:
      fail-fast: false
      matrix:
        include:

          # ── OpenBLAS bundled, auto-detected ────────────────────────────
          - scenario:       openblas-bundled-auto
            os:             ubuntu-22.04
            packages:       libopenblas-dev liblapacke-dev
            cmake_args:     ""
            expect_found:   true
            cmake_version:  "3.25"

          - scenario:       openblas-bundled-auto
            os:             ubuntu-22.04
            packages:       libopenblas-dev liblapacke-dev
            cmake_args:     ""
            expect_found:   true
            cmake_version:  "latest"

          # ── OpenBLAS with explicit BLA_VENDOR ──────────────────────────
          - scenario:       openblas-explicit-vendor
            os:             ubuntu-22.04
            packages:       libopenblas-dev liblapacke-dev
            cmake_args:     "-DBLA_VENDOR=OpenBLAS"
            expect_found:   true
            cmake_version:  "3.25"

          - scenario:       openblas-explicit-vendor
            os:             ubuntu-22.04
            packages:       libopenblas-dev liblapacke-dev
            cmake_args:     "-DBLA_VENDOR=OpenBLAS"
            expect_found:   true
            cmake_version:  "latest"

          # ── Standalone liblapacke (reference LAPACK) ───────────────────
          - scenario:       standalone-liblapacke
            os:             ubuntu-22.04
            packages:       liblapack-dev liblapacke-dev
            cmake_args:     ""
            expect_found:   true
            cmake_version:  "3.25"

          # ── LAPACKE_ROOT pointing to the system prefix ─────────────────
          - scenario:       custom-prefix
            os:             ubuntu-22.04
            packages:       libopenblas-dev liblapacke-dev
            cmake_args:     "-DLAPACKE_ROOT=/usr"
            expect_found:   true
            cmake_version:  "3.25"

          # ── LAPACKE absent, non-REQUIRED ───────────────────────────────
          - scenario:       not-found
            os:             ubuntu-22.04
            packages:       liblapack-dev
            cmake_args:     "-DEXPECT_FOUND=OFF"
            expect_found:   false
            cmake_version:  "3.25"

          # ── LAPACKE absent, REQUIRED → configure must fail ─────────────
          - scenario:           not-found-required
            os:                 ubuntu-22.04
            packages:           liblapack-dev
            cmake_args:         "-DLAPACKE_REQUIRED=ON"
            expect_found:       false
            expect_configure_failure: true
            cmake_version:      "3.25"

          # ── macOS / Homebrew OpenBLAS ──────────────────────────────────
          - scenario:       macos-homebrew
            os:             macos-14
            packages:       openblas
            cmake_args:     ""          # LAPACKE_ROOT added dynamically below
            expect_found:   true
            cmake_version:  "3.25"

          # ── Spack / OpenBLAS (bundled LAPACKE) ────────────────────────
          # spack load populates CMAKE_PREFIX_PATH with the OpenBLAS prefix,
          # which CMake uses to find both the library and lapacke.h without
          # any explicit LAPACKE_ROOT hint.
          - scenario:       spack-openblas
            os:             ubuntu-22.04
            packages:       libopenblas-dev liblapacke-dev
            spack_spec:     openblas
            cmake_args:     ""
            expect_found:   true
            cmake_version:  "3.25"

          # ── Spack / netlib LAPACK + standalone LAPACKE ────────────────
          # netlib-lapack does not bundle LAPACKE symbols, so the bundled
          # probe fails and the fallback find_library picks up liblapacke
          # from the same Spack prefix via CMAKE_PREFIX_PATH.
          - scenario:       spack-netlib-lapacke
            os:             ubuntu-22.04
            packages:       libopenblas-dev liblapacke-dev
            spack_spec:     "netlib-lapack+lapacke"
            cmake_args:     ""
            expect_found:   true
            cmake_version:  "3.25"

          # ── Spack / OpenBLAS (bundled LAPACKE) ────────────────────────
          # spack load populates CMAKE_PREFIX_PATH with the OpenBLAS prefix,
          # which CMake uses to find both the library and lapacke.h without
          # any explicit LAPACKE_ROOT hint.
          - scenario:       spack-openblas
            os:             ubuntu-22.04
            packages:       ""
            spack_spec:     "openblas"
            cmake_args:     ""
            expect_found:   true
            cmake_version:  "3.25"

    # -----------------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up CMake ${{ matrix.cmake_version }}
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ matrix.cmake_version }}

      # -- Install dependencies --------------------------------------------

      - name: Install packages (Ubuntu)
        if: runner.os == 'Linux' && matrix.packages != ''
        run: sudo apt-get install -y ${{ matrix.packages }}

      - name: Install packages (macOS)
        if: runner.os == 'macOS'
        run: brew install ${{ matrix.packages }}

      # LAPACKE_ROOT must reflect the actual Homebrew prefix, which differs
      # between Intel (/usr/local) and Apple Silicon (/opt/homebrew) runners.
      - name: Resolve Homebrew LAPACKE_ROOT (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "BREW_LAPACKE_ROOT=$(brew --prefix openblas)" >> "$GITHUB_ENV"

      # -- Spack setup (only for Spack scenarios) --------------------------

      - name: Clone Spack
        if: matrix.spack_spec != ''
        uses: actions/checkout@v4
        with:
          repository: spack/spack
          # Pin to a stable release branch for reproducibility.
          ref:        releases/v0.22
          path:       spack

      # Cache the Spack install tree between runs. The key includes the spec
      # so that different scenarios never share an incompatible store.
      - name: Cache Spack install tree
        if: matrix.spack_spec != ''
        uses: actions/cache@v4
        with:
          path: ~/.spack-store
          key: spack-${{ matrix.spack_spec }}-${{ runner.os }}-${{ hashFiles('spack/var/spack/repos/builtin/packages/openblas/package.py', 'spack/var/spack/repos/builtin/packages/netlib-lapack/package.py') }}
          restore-keys: spack-${{ matrix.spack_spec }}-${{ runner.os }}-

      - name: Bootstrap Spack and install compilers
        if: matrix.spack_spec != ''
        run: |
          . spack/share/spack/setup-env.sh
          spack bootstrap now
          # Use the system GCC so no compiler needs to be built from source.
          spack compiler find

      # Install each spec listed in spack_spec (space-separated).
      # --reuse picks up any matching cached packages before building.
      - name: Install Spack packages
        if: matrix.spack_spec != ''
        run: |
          . spack/share/spack/setup-env.sh
          for spec in ${{ matrix.spack_spec }}; do
            spack install --reuse --no-check-signature "$spec"
          done

      # Load installed packages into the current shell so that Spack sets
      # CMAKE_PREFIX_PATH (and PATH, LD_LIBRARY_PATH, etc.) for the prefixes
      # that were just installed.  spack load modifies the shell environment
      # via the shell function defined by setup-env.sh; the resulting values
      # of the CMake-relevant variables are then forwarded to subsequent steps
      # through GITHUB_ENV so that the configure step sees them without any
      # explicit LAPACKE_ROOT hint.
      - name: Load Spack packages into environment
        if: matrix.spack_spec != ''
        run: |
          . spack/share/spack/setup-env.sh
          spack load ${{ matrix.spack_spec }}
          for var in CMAKE_PREFIX_PATH PATH LD_LIBRARY_PATH PKG_CONFIG_PATH; do
            [ -n "${!var}" ] && echo "${var}=${!var}" >> "$GITHUB_ENV"
          done

      # -- Configure -------------------------------------------------------

      - name: Configure (expect success)
        if: "!matrix.expect_configure_failure"
        run: >
          cmake -S tests -B build
          -DCMAKE_MODULE_PATH="${{ github.workspace }}"
          ${{ matrix.cmake_args }}
          ${{ env.BREW_LAPACKE_ROOT && format('-DLAPACKE_ROOT={0}', env.BREW_LAPACKE_ROOT) || '' }}

      # A separate step with id so we can inspect its outcome.
      - name: Configure (expect failure)
        if: matrix.expect_configure_failure
        id: configure_expect_fail
        continue-on-error: true
        run: >
          cmake -S tests -B build
          -DCMAKE_MODULE_PATH="${{ github.workspace }}"
          ${{ matrix.cmake_args }}

      - name: Assert configure did fail
        if: matrix.expect_configure_failure
        run: |
          if [ "${{ steps.configure_expect_fail.outcome }}" != "failure" ]; then
            echo "::error::Configure was expected to fail (LAPACKE REQUIRED + absent)" \
                 "but it succeeded."
            exit 1
          fi
          echo "Configure correctly rejected missing REQUIRED LAPACKE."

      # -- Build & run -----------------------------------------------------

      - name: Build
        if: "!matrix.expect_configure_failure && matrix.expect_found"
        run: cmake --build build --parallel

      - name: Run test binary
        if: "!matrix.expect_configure_failure && matrix.expect_found"
        run: ./build/test_lapacke
